// public/index.html
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Coming Soon</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@600&display=swap');
    body {
      margin: 0;
      background: #f4f4f4;
      color: #333;
      font-family: 'Montserrat', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      text-align: center;
      flex-direction: column;
      padding: 20px;
      transition: background 0.5s ease;
    }
    h1 {
      font-size: 3.5rem;
      margin: 0 0 20px;
      letter-spacing: 3px;
      font-weight: 600;
      text-transform: uppercase;
      color: #444;
    }
    p {
      font-size: 1.125rem;
      margin: 0 0 30px;
      max-width: 400px;
      color: #666;
    }
    .countdown {
      font-size: 1.25rem;
      background-color: #0073e6;
      border-radius: 8px;
      padding: 15px 30px;
      display: inline-block;
      letter-spacing: 2px;
      font-weight: 600;
      color: white;
      box-shadow: 0 2px 8px rgba(0, 115, 230, 0.3);
      user-select: none;
    }
    .countdown:hover {
      background-color: #005bb5;
      cursor: default;
    }
    @media (max-width: 600px) {
      h1 {
        font-size: 2.5rem;
        letter-spacing: 2px;
      }
      p {
        font-size: 1rem;
        max-width: 90%;
      }
      .countdown {
        font-size: 1rem;
        padding: 10px 24px;
        letter-spacing: 1.5px;
      }
    }
  </style>
</head>
<body>
  <h1>Coming Soon</h1>
  <p>Our new website is on its way. Stay tuned!</p>
  <div class="countdown" id="countdown" aria-live="polite" aria-atomic="true">Loading countdown...</div>

  <script>
    // Set your launch date here (YYYY-MM-DDTHH:mm:ss)
    const launchDate = new Date('2026-07-31T00:00:00Z').getTime();

    function updateCountdown() {
      const now = new Date().getTime();
      const distance = launchDate - now;

      if (distance < 0) {
        document.getElementById('countdown').innerText = "We're live!";
        clearInterval(countdownInterval);
        return;
      }

      const days = Math.floor(distance / (1000 * 60 * 60 * 24));
      const hours = Math.floor((distance % (1000 * 60 * 60 * 24)) / (1000 * 60 * 60));
      const minutes = Math.floor((distance % (1000 * 60 * 60)) / (1000 * 60));
      const seconds = Math.floor((distance % (1000 * 60)) / 1000);

      document.getElementById('countdown').innerText =
        days + "d " + hours + "h " + minutes + "m " + seconds + "s ";
    }

    updateCountdown();
    const countdownInterval = setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
